# ─────────────────────────────────────────────────────
#  Nginx — Reverse Proxy for Presentation + Demo
#
#  /           → Next.js presentation  (localhost:3000)
#  /demo       → Streamlit app         (localhost:8501)
# ─────────────────────────────────────────────────────

upstream nextjs {
    server 127.0.0.1:3000;
}

upstream streamlit {
    server 127.0.0.1:8501;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # ── Presentation (default) ────────────────────────
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── Next.js static assets ────────────────────────
    location /_next/ {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 60m;
    }

    # ── Streamlit Demo ───────────────────────────────
    location /demo {
        return 302 /demo/;
    }

    location /demo/ {
        proxy_pass http://streamlit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /demo;
        proxy_read_timeout 86400;
        proxy_buffering off;
    }

    # ── Streamlit websocket (component communication) ─
    location /demo/_stcore/stream {
        proxy_pass http://streamlit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ── Streamlit health endpoint ────────────────────
    location /demo/_stcore/health {
        proxy_pass http://streamlit;
    }

    # ── Streamlit static assets ──────────────────────
    location /demo/static/ {
        proxy_pass http://streamlit;
    }

    location /demo/component/ {
        proxy_pass http://streamlit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
