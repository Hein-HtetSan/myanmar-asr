# ─────────────────────────────────────────────────────
#  Myanmar ASR — Presentation Docker Compose
#
#  Usage:
#    docker compose -f docker-compose.presentation.yml up --build
#
#  Then open:
#    http://localhost:8090        → Slide Deck
#    http://localhost:8090/demo   → Streamlit ASR Demo
#
#  With MLflow/MinIO (from services/docker-compose.yml):
#    cd services && docker compose up -d
#    cd .. && docker compose -f docker-compose.presentation.yml up --build
# ─────────────────────────────────────────────────────

services:
  presentation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myanmar-asr-presentation
    ports:
      - "8090:80"
    environment:
      # Point to MLflow/MinIO on the host (docker-compose in services/)
      - MLFLOW_TRACKING_URI=http://host.docker.internal:5050
      - MLFLOW_S3_ENDPOINT_URL=http://host.docker.internal:9002
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      # Cloud inference via SSH tunnel (if active on host)
      - CLOUD_INFERENCE_URL=http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
